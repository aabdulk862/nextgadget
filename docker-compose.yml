services:
  postgres:
    image: postgres:15
    container_name: nextgadget-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nextgadget_users
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: nextgadget-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nextgadget-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nextgadget-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper

  eureka:
    build: ./eureka
    container_name: nextgadget-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  gateway:
    build: ./gateway
    container_name: nextgadget-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      JWT_SECRET: 2N+vHTiJ3eQeBxxoA+YP0rHNsLjquQQnpOYkE9fQIbOQwR4Wzx9Q+0iW+n5wXz+f7pHoRd5Q8axqGvg6yWQFZkg==
    depends_on:
      eureka:
        condition: service_healthy

  user-service:
    build: ./user
    container_name: nextgadget-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nextgadget_users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      JWT_SECRET: 2N+vHTiJ3eQeBxxoA+YP0rHNsLjquQQnpOYkE9fQIbOQwR4Wzx9Q+0iW+n5wXz+f7pHoRd5Q8axqGvg6yWQFZkg==
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy

  product-service:
    build: ./product
    container_name: nextgadget-product
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nextgadget_products
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy

  order-service:
    build: ./order
    container_name: nextgadget-order
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nextgadget_orders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      kafka:
        condition: service_started

  notification:
    build: ./notification
    container_name: nextgadget-notification
    ports:
      - "8084:8084"
    environment:
      MONGO_URI: mongodb://mongodb:27017/nextgadget_notifications
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: nextgadget-frontend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  mongo-data:
